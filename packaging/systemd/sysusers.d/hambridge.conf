# HaMBridge — static user for systemd service (Hardware-MQTT Bridge)
# Install to /usr/lib/sysusers.d/ or /etc/sysusers.d/, then: systemd-sysusers
#
#Type Name       ID GECOS                              Home               Shell
g     hambridge  -  -
u     hambridge  -  "HaMBridge Hardware-MQTT Bridge"   /var/lib/hambridge /usr/sbin/nologin
#
# Optional (broader): add hambridge to group "input" so every input node group-readable by
# "input" is also readable by this service. Prefer narrow udev rules in ../udev/ instead.
# m hambridge input
